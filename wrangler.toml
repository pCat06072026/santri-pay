# Santri-Pay - Cloudflare Workers
name = "santri-pay"
main = ".output/server/index.mjs"
compatibility_date = "2024-07-01"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "santri-pay-dev"
database_id = "719d78ea-4055-404f-8285-da32af46e164"

# Production D1 Database
[[d1_databases]]
binding = "DB_PROD"
database_name = "santri-pay-prod"
database_id = "20143140-fb43-49d7-8c4c-f6ea0c39e897"

